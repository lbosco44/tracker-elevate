<body class="p-4 md:p-6">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const defaultSettings = {
            expiryThresholds: { red: 3, yellow: 7, blue: 8 }
        };

        const defaultProps = [
            { id: 'ftmo', name: 'FTMO', expiryDays: 30, rules: { fase1: {target: 10, maxLoss: -10}, fase2: {target: 5, maxLoss: -10}, funded: {maxLoss: -10}}},
            { id: 'fundednext', name: 'FundedNext', expiryDays: 30, rules: { fase1: {target: 10, maxLoss: -5}, fase2: {target: 5, maxLoss: -5}, funded: {maxLoss: -5}}},
            { id: 'funderpro', name: 'FunderPro', expiryDays: 14, rules: { fase1: {target: 10, maxLoss: -10}, fase2: {target: 5, maxLoss: -10}, funded: {maxLoss: -10}}},
            { id: 'alphacapital', name: 'AlphaCapital', expiryDays: null, rules: { onephase: {target: 10, maxLoss: -10}, funded: {maxLoss: -10}}}
        ];

        const COL = 'tracker';
        const save = (doc, data) => db.collection(COL).doc(doc).set(data);

        function App() {
            const [tab, setTab] = useState('dashboard');
            const [accounts, setAccounts] = useState([]);
            const [props, setProps] = useState([]);
            const [payouts, setPayouts] = useState([]);
            const [settings, setSettings] = useState(defaultSettings);
            const [credenziali, setCredenziali] = useState({});
            const [modal, setModal] = useState(null);
            const [loading, setLoading] = useState(true);
            const ready = useRef(false);
            const loaded = useRef(0);

            // Load all data from Firestore with real-time sync
            useEffect(() => {
                const markLoaded = () => { loaded.current++; if (loaded.current === 5) { ready.current = true; setLoading(false); } };

                const u1 = db.collection(COL).doc('accounts').onSnapshot(s => {
                    setAccounts(s.exists ? (s.data().list || []) : []);
                    markLoaded();
                });
                const u2 = db.collection(COL).doc('props').onSnapshot(s => {
                    setProps(s.exists ? (s.data().list || defaultProps) : defaultProps);
                    if (!s.exists) save('props', {list: defaultProps});
                    markLoaded();
                });
                const u3 = db.collection(COL).doc('payouts').onSnapshot(s => {
                    setPayouts(s.exists ? (s.data().list || []) : []);
                    markLoaded();
                });
                const u4 = db.collection(COL).doc('settings').onSnapshot(s => {
                    setSettings(s.exists ? (s.data() || defaultSettings) : defaultSettings);
                    if (!s.exists) save('settings', defaultSettings);
                    markLoaded();
                });
                const u5 = db.collection(COL).doc('credenziali').onSnapshot(s => {
                    setCredenziali(s.exists ? (s.data() || {}) : {});
                    markLoaded();
                });

                return () => { u1(); u2(); u3(); u4(); u5(); };
            }, []);

            // Write to Firestore whenever state changes (only after initial load)
            useEffect(() => { if (ready.current) save('accounts', {list: accounts}); }, [accounts]);
            useEffect(() => { if (ready.current) save('props', {list: props}); }, [props]);
            useEffect(() => { if (ready.current) save('payouts', {list: payouts}); }, [payouts]);
            useEffect(() => { if (ready.current) save('settings', settings); }, [settings]);
            useEffect(() => { if (ready.current) save('credenziali', credenziali); }, [credenziali]);

            const updCred = (accId, data) => setCredenziali(prev => ({...prev, [accId]: data}));

            const addAcc = (a) => { setAccounts([...accounts, {...a, id: `a${Date.now()}`, createdAt: new Date().toISOString(), lastUpdate: new Date().toISOString(), status: 'active', notes: ''}]); setModal(null); };
            const updAcc = (id, upd) => setAccounts(accounts.map(a => a.id === id ? {...a, ...upd} : a));
            const quickTrade = (id) => updAcc(id, {lastUpdate: new Date().toISOString()});
            const archive = (id, reason) => updAcc(id, {status: 'archived', archiveReason: reason, archivedAt: new Date().toISOString()});
            
            const reqPayout = (id) => {
                const acc = accounts.find(a => a.id === id);
                if (!acc) return;
                const profit = acc.currentBalance - acc.size;
                const p = { id: `p${Date.now()}`, accountId: id, accountNumber: acc.accountNumber, clientName: acc.clientName, propFirm: acc.propFirm, amount: profit, requestedAt: new Date().toISOString(), status: 'pending' };
                setPayouts([...payouts, p]);
                updAcc(id, {payoutPending: true, pendingPayoutId: p.id});
            };
            
            const compPayout = (pid, aid) => {
                setPayouts(payouts.map(p => p.id === pid ? {...p, status: 'completed', completedAt: new Date().toISOString()} : p));
                const acc = accounts.find(a => a.id === aid);
                if (acc) updAcc(aid, {currentBalance: acc.size, payoutPending: false, pendingPayoutId: null, lastUpdate: new Date().toISOString()});
            };

            const addProp = (p) => { setProps([...props, {...p, id: `pr${Date.now()}`}]); setModal(null); };
            const updProp = (id, upd) => setProps(props.map(p => p.id === id ? {...p, ...upd} : p));
            const delProp = (id) => { if(confirm('Eliminare?')) setProps(props.filter(p => p.id !== id)); };

            const delAcc = (id) => {
                setAccounts(accounts.filter(a => a.id !== id));
                setCredenziali(prev => { const c = {...prev}; delete c[id]; return c; });
            };
            const delPayout = (id) => setPayouts(payouts.filter(p => p.id !== id));

            const active = accounts.filter(a => a.status === 'active');
            const critical = active.filter(a => {
                const prop = props.find(p => p.id === a.propFirm);
                if (!prop?.expiryDays) return false;
                const days = Math.floor((Date.now() - new Date(a.lastUpdate)) / 86400000);
                return (prop.expiryDays - days) <= settings.expiryThresholds.red;
            }).length;
            
            const pending = payouts.filter(p => p.status === 'pending').length;
            const archived = accounts.filter(a => a.status === 'archived').length;

            return (
                <div className="max-w-7xl mx-auto">
                    {loading && (
                        <div className="fixed inset-0 flex flex-col items-center justify-center z-50" style={{background: '#080812'}}>
                            <div style={{width:48,height:48,border:'4px solid rgba(255,255,255,0.1)',borderTop:'4px solid #f97316',borderRadius:'50%',animation:'spin 0.8s linear infinite'}}></div>
                            <div className="text-gray-400 mt-4 text-sm">Connessione a Firebase…</div>
                            <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
                        </div>
                    )}
                    <div className="mb-5">
                        <h1 className="text-2xl md:text-4xl font-bold text-white mb-1">Prop Tracker Pro <span className="text-orange-400 text-lg md:text-xl">v2.0</span></h1>
                        <p className="text-gray-400 text-sm">Gestione avanzata conti prop firm</p>
                    </div>

                    <div className="glass-nav p-1.5 rounded-xl mb-6 flex gap-1 overflow-x-auto scrollbar-hide" style={{WebkitOverflowScrolling: 'touch'}}>
                        {[
                            {id: 'dashboard', label: 'Dashboard', badge: critical},
                            {id: 'stats', label: 'Statistiche', badge: 0},
                            {id: 'dati', label: 'Dati', badge: 0},
                            {id: 'archive', label: 'Archivio', badge: pending},
                            {id: 'config', label: 'Config', badge: 0}
                        ].map(t => (
                            <button key={t.id} onClick={() => setTab(t.id)} className={`relative px-4 py-2.5 rounded-lg font-semibold transition-all whitespace-nowrap flex-shrink-0 text-sm ${tab === t.id ? 'bg-orange-500 text-white shadow-lg' : 'text-gray-400 hover:text-white'}`}>
                                {t.label}
                                {t.badge > 0 && <span className="badge">{t.badge}</span>}
                            </button>
                        ))}
                    </div>

                    {tab === 'dashboard' && <Dashboard accounts={active} props={props} settings={settings} payouts={payouts} credenziali={credenziali} onAdd={() => setModal('addAcc')} onUpd={updAcc} onQuick={quickTrade} onArchive={archive} onReqPay={reqPayout} onCompPay={compPayout} />}
                    {tab === 'stats' && <Stats accounts={accounts} props={props} payouts={payouts} />}
                    {tab === 'dati' && <Dati accounts={active} props={props} credenziali={credenziali} onUpdCred={updCred} />}
                    {tab === 'archive' && <Archive archived={accounts.filter(a => a.status === 'archived')} payouts={payouts} props={props} onDelAcc={delAcc} onDelPayout={delPayout} />}
                    {tab === 'config' && <Config props={props} settings={settings} onAddProp={() => setModal('addProp')} onUpdProp={updProp} onDelProp={delProp} onUpdSets={(s) => setSettings({...settings, ...s})} />}

                    {modal === 'addAcc' && <AddAccModal props={props} onAdd={addAcc} onClose={() => setModal(null)} />}
                    {modal === 'addProp' && <AddPropModal onAdd={addProp} onClose={() => setModal(null)} />}
                </div>
            );
        }

        function Dashboard({accounts, props, settings, payouts, credenziali, onAdd, onUpd, onQuick, onArchive, onReqPay, onCompPay}) {
            const [compact, setCompact] = useState(false);
            const [filter, setFilter] = useState('all');
            const [sort, setSort] = useState('date-desc');
            const [search, setSearch] = useState('');
            const [detail, setDetail] = useState(null);
            const [credModal, setCredModal] = useState(null);
            const [actionModal, setActionModal] = useState(null); // {type, title, message, defaultValue, onConfirm}

            const getExp = (a) => {
                const p = props.find(pr => pr.id === a.propFirm);
                if (!p?.expiryDays) return {cls: 'expiry-blue', col: 'text-orange-400', txt: 'No scad', days: 999};
                const d = Math.floor((Date.now() - new Date(a.lastUpdate)) / 86400000);
                const left = p.expiryDays - d;
                if (left <= settings.expiryThresholds.red) return {cls: 'expiry-red', col: 'text-red-400', txt: `${left}g`, days: left};
                if (left <= settings.expiryThresholds.yellow) return {cls: 'expiry-yellow', col: 'text-yellow-400', txt: `${left}g`, days: left};
                return {cls: 'expiry-blue', col: 'text-orange-400', txt: `${left}g`, days: left};
            };

            const getPerf = (a) => ((a.currentBalance - a.size) / a.size) * 100;
            
            const getStat = (a) => {
                const p = props.find(pr => pr.id === a.propFirm);
                if (!p) return null;
                const perf = getPerf(a);
                const ph = a.phase.toLowerCase().replace(' ', '');
                const r = p.rules[ph];
                if (!r) return null;
                if (r.target && perf >= r.target) return {type: 'success', txt: '🎉 Superata!'};
                if (perf <= r.maxLoss) return {type: 'danger', txt: '❌ Bruciato'};
                return null;
            };

            const getCardCls = (a) => {
                const perf = getPerf(a);
                return perf > 0 ? 'profit-card' : perf < 0 ? 'loss-card' : 'neutral-card';
            };

            const crit = accounts.filter(a => getExp(a).days <= settings.expiryThresholds.red);
            const succ = accounts.filter(a => getStat(a)?.type === 'success');
            const dang = accounts.filter(a => getStat(a)?.type === 'danger');

            const manual = accounts.filter(a => ['Fase 1','Fase 2','OnePhase'].includes(a.phase) && a.strategy === 'Manuale');
            const mate = accounts.filter(a => ['Fase 1','Fase 2','OnePhase'].includes(a.phase) && a.strategy === 'Mate');
            const funded = accounts.filter(a => a.phase === 'Funded');

            let disp = accounts;
            if (filter.startsWith('section:')) {
                const s = filter.split(':')[1];
                disp = s === 'manual' ? manual : s === 'mate' ? mate : funded;
            } else if (filter.startsWith('prop:')) {
                disp = accounts.filter(a => a.propFirm === filter.split(':')[1]);
            } else if (filter.startsWith('platform:')) {
                disp = accounts.filter(a => a.platform === filter.split(':')[1]);
            } else if (filter.startsWith('size:')) {
                disp = accounts.filter(a => a.size === parseInt(filter.split(':')[1]));
            }

            disp = [...disp].sort((a,b) => {
                if (sort === 'date-desc') return new Date(b.lastUpdate) - new Date(a.lastUpdate);
                if (sort === 'date-asc') return new Date(a.lastUpdate) - new Date(b.lastUpdate);
                if (sort === 'profit-desc') return getPerf(b) - getPerf(a);
                if (sort === 'profit-asc') return getPerf(a) - getPerf(b);
                return 0;
            });

            if (search.trim()) {
                const q = search.trim().toLowerCase();
                disp = disp.filter(a => a.clientName.toLowerCase().includes(q));
            }

            return (
                <div>
                    {(crit.length > 0 || succ.length > 0 || dang.length > 0) && (
                        <div className="space-y-3 mb-6">
                            {crit.length > 0 && (
                                <div className="glass-card rounded-xl p-4 border-red-500/30">
                                    <div className="flex gap-3 items-center">
                                        <span className="text-2xl">⚠️</span>
                                        <div>
                                            <div className="text-red-400 font-semibold">Scadenze critiche!</div>
                                            <div className="text-gray-400 text-sm">{crit.length} {crit.length === 1 ? 'conto' : 'conti'} in scadenza</div>
                                        </div>
                                    </div>
                                </div>
                            )}
                            {succ.length > 0 && (
                                <div className="glass-card rounded-xl p-4 border-green-500/30">
                                    <div className="flex gap-3 items-center">
                                        <span className="text-2xl">🎉</span>
                                        <div>
                                            <div className="text-green-400 font-semibold">Challenge superate!</div>
                                            <div className="text-gray-400 text-sm">{succ.map(a => a.clientName).join(', ')}</div>
                                        </div>
                                    </div>
                                </div>
                            )}
                            {dang.length > 0 && (
                                <div className="glass-card rounded-xl p-4 border-red-500/30">
                                    <div className="flex gap-3 items-center">
                                        <span className="text-2xl">❌</span>
                                        <div>
                                            <div className="text-red-400 font-semibold">Conti a rischio</div>
                                            <div className="text-gray-400 text-sm">{dang.map(a => a.clientName).join(', ')}</div>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}

                    <div className="flex flex-col gap-2 mb-6">
                        {/* Search bar - full width */}
                        <div className="relative">
                            <span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm">🔍</span>
                            <input
                                type="text"
                                value={search}
                                onChange={e => setSearch(e.target.value)}
                                placeholder="Cerca cliente…"
                                className="w-full glass-card text-white pl-9 pr-4 py-2.5 rounded-lg text-sm placeholder-gray-500"
                            />
                            {search && (
                                <button onClick={() => setSearch('')} className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-white text-sm">✕</button>
                            )}
                        </div>
                        {/* Filters row + button */}
                        <div className="flex gap-2 flex-wrap items-center">
                            <select value={filter} onChange={e => setFilter(e.target.value)} className="glass-card text-white px-3 py-2 rounded-lg text-sm flex-1 min-w-0">
                                <option value="all">Tutti ({accounts.length})</option>
                                <optgroup label="Sezioni">
                                    <option value="section:manual">Challenge Manuale ({manual.length})</option>
                                    <option value="section:mate">Challenge Mate ({mate.length})</option>
                                    <option value="section:funded">Funded ({funded.length})</option>
                                </optgroup>
                                <optgroup label="Prop">
                                    {[...new Set(accounts.map(a => a.propFirm))].map(pf => (
                                        <option key={pf} value={`prop:${pf}`}>{props.find(p => p.id === pf)?.name}</option>
                                    ))}
                                </optgroup>
                                <optgroup label="Platform">
                                    {[...new Set(accounts.map(a => a.platform))].map(pl => (
                                        <option key={pl} value={`platform:${pl}`}>{pl}</option>
                                    ))}
                                </optgroup>
                                <optgroup label="Size">
                                    {[...new Set(accounts.map(a => a.size))].sort((a,b) => a-b).map(s => (
                                        <option key={s} value={`size:${s}`}>${s/1000}k</option>
                                    ))}
                                </optgroup>
                            </select>

                            <select value={sort} onChange={e => setSort(e.target.value)} className="glass-card text-white px-3 py-2 rounded-lg text-sm">
                                <option value="date-desc">Recenti</option>
                                <option value="date-asc">Vecchi</option>
                                <option value="profit-desc">Profit ↓</option>
                                <option value="profit-asc">Perdita ↓</option>
                            </select>

                            <button onClick={() => setCompact(!compact)} className="glass-card px-3 py-2 rounded-lg text-white text-sm hover:bg-white/10" title={compact ? 'Vista estesa' : 'Vista compatta'}>
                                {compact ? '📋' : '🔲'}
                            </button>

                            <button onClick={onAdd} className="bg-orange-500 hover:bg-orange-400 active:bg-orange-600 text-white px-5 py-2 rounded-lg font-semibold text-sm ml-auto">
                                + Nuovo
                            </button>
                        </div>
                        {search && <div className="text-xs text-gray-500">{disp.length} risultat{disp.length === 1 ? 'o' : 'i'} per "<span className="text-gray-300">{search}</span>"</div>}
                    </div>

                    <div className={`grid gap-4 ${compact ? 'grid-cols-2 sm:grid-cols-3 lg:grid-cols-4' : 'grid-cols-1 sm:grid-cols-2 lg:grid-cols-3'}`}>
                        {disp.map(acc => {
                            const exp = getExp(acc);
                            const perf = getPerf(acc);
                            const stat = getStat(acc);
                            const pend = acc.payoutPending ? payouts.find(p => p.id === acc.pendingPayoutId) : null;

                            if (compact) {
                                return (
                                    <div key={acc.id} className={`glass-card ${getCardCls(acc)} rounded-xl p-3 cursor-pointer`} onClick={() => setDetail(acc)}>
                                        <div className="flex justify-between mb-2">
                                            <div className="flex-1 min-w-0">
                                                <div className="text-white font-bold text-sm truncate">{acc.clientName}</div>
                                                <div className="text-gray-400 text-xs truncate">{acc.accountNumber}</div>
                                            </div>
                                            <div className={`text-lg font-bold ml-2 ${perf >= 0 ? 'text-green-400' : 'text-red-400'}`}>
                                                {perf >= 0 ? '+' : ''}{perf.toFixed(1)}%
                                            </div>
                                        </div>
                                        <div className={`${exp.cls} rounded p-2 text-center`}>
                                            <div className={`text-xs font-semibold ${exp.col}`}>{exp.txt}</div>
                                        </div>
                                        {stat && (
                                            <div className={`mt-2 text-center text-xs font-semibold ${stat.type === 'success' ? 'text-green-400' : 'text-red-400'}`}>
                                                {stat.txt}
                                            </div>
                                        )}
                                    </div>
                                );
                            }

                            return (
                                <div key={acc.id} className={`glass-card ${getCardCls(acc)} rounded-xl overflow-hidden`}>
                                    <div className="p-5">
                                        <div className="flex justify-between items-start mb-3">
                                            <div className="flex-1">
                                                <div className="text-gray-400 text-xs mb-1">{acc.accountNumber}</div>
                                                <div className="text-white font-bold text-lg">{acc.clientName}</div>
                                                {acc.notes && <div className="text-gray-500 text-xs italic mt-1">💭 {acc.notes}</div>}
                                            </div>
                                        <div className="flex gap-1">
                                            <button onClick={() => setCredModal(acc)} className="text-xs bg-white/5 hover:bg-white/10 px-2 py-1 rounded text-gray-400" title="Credenziali">🔒</button>
                                            <button onClick={() => onQuick(acc.id)} className="text-xs bg-white/5 hover:bg-white/10 px-2 py-1 rounded text-gray-400" title="Trade oggi">⚡</button>
                                        </div>
                                        </div>

                                        <div className="space-y-1.5 mb-3 text-sm">
                                            <div className="flex justify-between">
                                                <span className="text-gray-400">Prop</span>
                                                <span className="text-white font-semibold">{props.find(p => p.id === acc.propFirm)?.name}</span>
                                            </div>
                                            <div className="flex justify-between">
                                                <span className="text-gray-400">Size</span>
                                                <span className="text-white font-semibold">${acc.size/1000}k</span>
                                            </div>
                                            <div className="flex justify-between">
                                                <span className="text-gray-400">Fase</span>
                                                <span className="text-white font-semibold">{acc.phase}</span>
                                            </div>
                                        </div>

                                        <div className="mb-3">
                                            <div className="flex justify-between items-end">
                                                <span className="text-gray-400 text-sm">Balance</span>
                                                <div className="text-right">
                                                    <div className="text-white font-bold text-xl">${acc.currentBalance.toLocaleString()}</div>
                                                    <div className={`text-sm font-semibold ${perf >= 0 ? 'text-green-400' : 'text-red-400'}`}>
                                                        {perf >= 0 ? '+' : ''}{perf.toFixed(2)}%
                                                    </div>
                                                </div>
                                            </div>
                                        </div>

                                        {stat && (
                                            <div className={`mb-3 p-3 rounded-lg text-center ${stat.type === 'success' ? 'bg-green-500/10 border border-green-500/30' : 'bg-red-500/10 border border-red-500/30'}`}>
                                                <div className={`text-sm font-semibold ${stat.type === 'success' ? 'text-green-400' : 'text-red-400'}`}>
                                                    {stat.txt}
                                                </div>
                                            </div>
                                        )}

                                        {pend ? (
                                            <div className="mb-3 p-3 bg-yellow-500/10 border border-yellow-500/30 rounded-lg">
                                                <div className="text-yellow-400 text-sm font-semibold mb-2">Payout: ${pend.amount.toLocaleString()}</div>
                                                <button onClick={() => onCompPay(pend.id, acc.id)} className="w-full bg-green-600 hover:bg-green-700 text-white py-2 rounded-lg text-sm font-semibold">
                                                    Conferma Pagamento
                                                </button>
                                            </div>
                                        ) : perf > 0 && (
                                            <button onClick={() => onReqPay(acc.id)} className="w-full bg-orange-500 hover:bg-orange-400 text-white py-2 rounded-lg text-sm font-semibold mb-2">
                                                💰 Richiedi Payout
                                            </button>
                                        )}

                                        <div className="flex gap-2 mt-3">
                                            <button onClick={() => setActionModal({
                                                type: 'input', title: 'Aggiorna Balance',
                                                defaultValue: String(acc.currentBalance),
                                                onConfirm: (v) => { if(v) onUpd(acc.id, {currentBalance: parseFloat(v), lastUpdate: new Date().toISOString()}); setActionModal(null); }
                                            })} className="flex-1 bg-orange-500 hover:bg-orange-400 active:bg-orange-600 text-white py-2.5 rounded-lg text-sm font-semibold">
                                                Update
                                            </button>
                                            <button onClick={() => setActionModal({
                                                type: 'input', title: 'Note',
                                                defaultValue: acc.notes || '',
                                                onConfirm: (v) => { onUpd(acc.id, {notes: v}); setActionModal(null); }
                                            })} className="bg-white/5 hover:bg-white/10 text-white px-3 py-2.5 rounded-lg text-sm" title="Note">📝</button>
                                            <button onClick={() => setActionModal({
                                                type: 'danger', title: 'Brucia Conto',
                                                message: `Vuoi archiviare "${acc.clientName}" come bruciato? L'operazione non può essere annullata.`,
                                                onConfirm: () => { onArchive(acc.id, 'burn'); setActionModal(null); }
                                            })} className="bg-red-600 hover:bg-red-700 active:bg-red-800 text-white px-3 py-2.5 rounded-lg text-sm" title="Burn">🔥</button>
                                        </div>
                                    </div>

                                    <div className={`${exp.cls} p-3`}>
                                        <div className="flex justify-between items-center text-xs">
                                            <div>
                                                <div className={`font-semibold ${exp.col}`}>Scadenza: {exp.txt}</div>
                                                <div className="text-gray-500 mt-0.5">Ultimo: {new Date(acc.lastUpdate).toLocaleDateString('it-IT')}</div>
                                            </div>
                                            <div className="text-gray-400">{acc.platform}</div>
                                        </div>
                                    </div>
                                </div>
                            );
                        })}
                    </div>

                    {disp.length === 0 && (
                        <div className="text-center py-20">
                            <div className="text-gray-400 text-lg mb-4">Nessun conto trovato</div>
                            <button onClick={onAdd} className="bg-orange-500 hover:bg-orange-400 text-white px-6 py-3 rounded-lg font-semibold">
                                Aggiungi primo conto
                            </button>
                        </div>
                    )}

                    {detail && compact && (
                        <div className="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-50 p-4" onClick={() => setDetail(null)}>
                            <div className="glass-modal rounded-xl p-6 max-w-md w-full" onClick={e => e.stopPropagation()}>
                                <div className="text-white font-bold text-lg mb-4">{detail.clientName}</div>
                                <div className="space-y-2 text-sm mb-4">
                                    <div className="flex justify-between">
                                        <span className="text-gray-400">Account</span>
                                        <span className="text-white">{detail.accountNumber}</span>
                                    </div>
                                    <div className="flex justify-between">
                                        <span className="text-gray-400">Balance</span>
                                        <span className="text-white">${detail.currentBalance.toLocaleString()}</span>
                                    </div>
                                    <div className="flex justify-between">
                                        <span className="text-gray-400">Performance</span>
                                        <span className={getPerf(detail) >= 0 ? 'text-green-400' : 'text-red-400'}>
                                            {getPerf(detail).toFixed(2)}%
                                        </span>
                                    </div>
                                </div>
                                <button onClick={() => setDetail(null)} className="w-full bg-orange-500 hover:bg-orange-400 text-white py-2 rounded-lg">
                                    Chiudi
                                </button>
                            </div>
                        </div>
                    )}

                    {credModal && (
                        <CredViewModal acc={credModal} cred={credenziali[credModal.id]} props={props} onClose={() => setCredModal(null)} />
                    )}

                    {actionModal && (
                        <ActionModal {...actionModal} onCancel={() => setActionModal(null)} />
                    )}
                </div>
            );
        }

        // Modale universale: rimpiazza prompt() e confirm() su mobile
        function ActionModal({type, title, message, defaultValue, onConfirm, onCancel}) {
            const [val, setVal] = useState(defaultValue || '');
            const inputRef = useRef(null);
            useEffect(() => { if (type === 'input' && inputRef.current) inputRef.current.focus(); }, []);

            return (
                <div className="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-end sm:items-center justify-center z-[100] p-4" onClick={onCancel}>
                    <div className="glass-modal rounded-2xl p-6 w-full max-w-sm" onClick={e => e.stopPropagation()}>
                        <div className="text-white font-bold text-lg mb-2">{title}</div>
                        {message && <div className="text-gray-400 text-sm mb-4">{message}</div>}
                        {type === 'input' && (
                            <input
                                ref={inputRef}
                                type={title.toLowerCase().includes('balance') ? 'number' : 'text'}
                                value={val}
                                onChange={e => setVal(e.target.value)}
                                className="w-full glass-card text-white px-4 py-3 rounded-xl mb-4 text-base"
                                onKeyDown={e => e.key === 'Enter' && onConfirm(val)}
                            />
                        )}
                        <div className="flex gap-3">
                            <button onClick={onCancel} className="flex-1 bg-white/10 hover:bg-white/20 text-white py-3 rounded-xl font-semibold">
                                Annulla
                            </button>
                            <button
                                onClick={() => onConfirm(type === 'input' ? val : true)}
                                className={`flex-1 py-3 rounded-xl font-semibold text-white ${type === 'danger' ? 'bg-red-600 hover:bg-red-700' : 'bg-orange-500 hover:bg-orange-400'}`}
                            >
                                {type === 'danger' ? 'Conferma' : 'Salva'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        function CredViewModal({acc, cred, props, onClose}) {
            const prop = props.find(p => p.id === acc.propFirm);
            const hasCred = cred && Object.keys(cred).length > 0;

            const fields = {
                MT4: [{key:'server',label:'Server'},{key:'conto',label:'Numero Conto'},{key:'password',label:'Password'}],
                MT5: [{key:'server',label:'Server'},{key:'conto',label:'Numero Conto'},{key:'password',label:'Password'}],

            const fields = {
                MT4: [{key:'server',label:'Server',type:'text'},{key:'conto',label:'Numero Conto',type:'text'},{key:'password',label:'Password',type:'password'}],
                MT5: [{key:'server',label:'Server',type:'text'},{key:'conto',label:'Numero Conto',type:'text'},{key:'password',label:'Password',type:'password'}],
                cTrader: [{key:'email',label:'Email',type:'email'},{key:'password',label:'Password',type:'password'},{key:'conto',label:'Numero Conto',type:'text'}],

            return (

                                        </div>
                                        <div className="flex items-center gap-2">
                                            <span className={`text-xs font-semibold ${platformColor[acc.platform] || 'text-gray-400'}`}>{acc.platform}</span>
                                            {!isEditing && (
                                                <button onClick={() => startEdit(acc)} className="bg-orange-500 hover:bg-orange-400 text-white px-3 py-1.5 rounded-lg text-xs font-semibold">
                                                    {hasCred ? '✏️ Modifica' : '+ Inserisci'}
                                                </button>
                                            )}
                                        </div>
                                    </div>

                                    {/* Credential display / edit */}
                                    {(isEditing || hasCred) && (
                                        <div className="border-t border-white/5 px-4 pb-4 pt-3">

                                                <div className="space-y-3">
                                                    <div className={`grid gap-3 ${flds.length === 3 ? 'grid-cols-1 md:grid-cols-3' : 'grid-cols-1 md:grid-cols-2'}`}>

                                                                <label className="block text-gray-400 text-xs mb-1">{f.label}</label>
                                                                <div className="flex gap-1">
                                                                    <input

                                                                        value={form[f.key] || ''}

                                                                        className="flex-1 glass-card text-white px-3 py-2 rounded-lg text-sm"
                                                                        placeholder={f.label}

                                                                    {f.type === 'password' && (
                                                                        <button onClick={() => setShowPass(s => ({...s, [f.key]: !s[f.key]}))} className="bg-white/5 hover:bg-white/10 text-gray-400 px-2 rounded-lg text-xs">
                                                                            {showPass[f.key] ? '🙈' : '👁️'}

                                                            </div>
                                                        ))}
                                                    </div>
                                                    <div className="flex gap-2 pt-1">
                                                        <button onClick={() => saveEdit(acc)} className="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg text-sm font-semibold">💾 Salva</button>
                                                        <button onClick={() => setEditId(null)} className="bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded-lg text-sm">Annulla</button>

                                                    {flds.map(f => (
                                                        <div key={f.key}>
                                                            <div className="text-gray-500 text-xs mb-0.5">{f.label}</div>
                                                            <div className="text-white text-sm font-mono bg-white/5 px-3 py-2 rounded-lg break-all">
                                                                {f.type === 'password' ? '••••••••' : (cred[f.key] || '—')}
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        }

        function Stats({accounts, props, payouts}) {
            const chartRef = useRef(null);
            const chartInst = useRef(null);

            const active = accounts.filter(a => a.status === 'active');
            const archived = accounts.filter(a => a.status === 'archived' && a.archiveReason === 'burn');
            const funded = active.filter(a => a.phase === 'Funded');
            const challenge = active.filter(a => a.phase !== 'Funded');

            const totalProfit = active.reduce((sum, a) => sum + (a.currentBalance - a.size), 0);
            const completed = payouts.filter(p => p.status === 'completed');
            const totalPayout = completed.reduce((sum, p) => sum + p.amount, 0);
            const winRate = accounts.length > 0 ? ((funded.length / accounts.length) * 100).toFixed(1) : 0;

            useEffect(() => {
                if (!chartRef.current) return;
                const ctx = chartRef.current.getContext('2d');
                if (chartInst.current) chartInst.current.destroy();

                const monthly = {};
                completed.forEach(p => {
                    const m = new Date(p.completedAt).toLocaleDateString('it-IT', {year: 'numeric', month: 'short'});
                    monthly[m] = (monthly[m] || 0) + p.amount;
                });

                const labels = Object.keys(monthly).slice(-6);
                const data = labels.map(l => monthly[l]);

                chartInst.current = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels,
                        datasets: [{
                            label: 'Payout mensili',
                            data,
                            borderColor: 'rgb(249, 115, 22)',
                            backgroundColor: 'rgba(249, 115, 22, 0.1)',
                            tension: 0.4,
                            fill: true
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: { callback: v => `$${(v/1000).toFixed(0)}k` }
                            }
                        }
                    }
                });

                return () => { if (chartInst.current) chartInst.current.destroy(); };
            }, [completed]);

            return (
                <div className="space-y-6">
                    <h2 className="text-2xl font-bold text-white">Statistiche</h2>

                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                        <div className="glass-card rounded-xl p-4">
                            <div className="text-gray-400 text-sm mb-1">Conti Attivi</div>
                            <div className="text-white font-bold text-2xl">{active.length}</div>
                        </div>
                        <div className="glass-card rounded-xl p-4">
                            <div className="text-gray-400 text-sm mb-1">Funded</div>
                            <div className="text-green-400 font-bold text-2xl">{funded.length}</div>
                        </div>
                        <div className="glass-card rounded-xl p-4">
                            <div className="text-gray-400 text-sm mb-1">Challenge</div>
                            <div className="text-orange-400 font-bold text-2xl">{challenge.length}</div>
                        </div>
                        <div className="glass-card rounded-xl p-4">
                            <div className="text-gray-400 text-sm mb-1">Bruciati</div>
                            <div className="text-red-400 font-bold text-2xl">{archived.length}</div>
                        </div>
                    </div>

                    <div className="grid md:grid-cols-3 gap-4">
                        <div className="glass-card rounded-xl p-6">
                            <div className="text-gray-400 text-sm mb-2">Profitto Totale</div>
                            <div className={`font-bold text-3xl ${totalProfit >= 0 ? 'text-green-400' : 'text-red-400'}`}>
                                ${totalProfit.toLocaleString()}
                            </div>
                        </div>
                        <div className="glass-card rounded-xl p-6">
                            <div className="text-gray-400 text-sm mb-2">Payout Totali</div>
                            <div className="text-orange-400 font-bold text-3xl">${totalPayout.toLocaleString()}</div>
                            <div className="text-gray-500 text-xs mt-1">{completed.length} pagamenti</div>
                        </div>
                        <div className="glass-card rounded-xl p-6">
                            <div className="text-gray-400 text-sm mb-2">Win Rate</div>
                            <div className="text-orange-400 font-bold text-3xl">{winRate}%</div>
                            <div className="text-gray-500 text-xs mt-1">{funded.length}/{accounts.length} funded</div>
                        </div>
                    </div>

                    {completed.length > 0 && (
                        <div className="glass-card rounded-xl p-6">
                            <h3 className="text-white font-bold mb-4">Andamento Payout</h3>
                            <div style={{height: '300px'}}>
                                <canvas ref={chartRef}></canvas>
                            </div>
                        </div>
                    )}

                    <div className="glass-card rounded-xl p-6">
                        <h3 className="text-white font-bold mb-4">Conti per Prop Firm</h3>
                        <div className="space-y-3">
                            {props.map(p => {
                                const cnt = active.filter(a => a.propFirm === p.id).length;
                                if (cnt === 0) return null;
                                return (
                                    <div key={p.id} className="flex justify-between items-center">
                                        <span className="text-gray-400">{p.name}</span>
                                        <span className="text-white font-semibold">{cnt}</span>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );
        }

        function Archive({archived, payouts, props, onDelAcc, onDelPayout}) {
            const [dateFilter, setDateFilter] = useState('all');
            const [start, setStart] = useState('');
            const [end, setEnd] = useState('');
            const [showChart, setShowChart] = useState(false);
            const [actionModal, setActionModal] = useState(null);
            const chartRef = useRef(null);
            const chartInst = useRef(null);

            const filtered = payouts.filter(p => {
                if (p.status !== 'completed') return false;
                if (dateFilter === 'all') return true;
                const d = new Date(p.completedAt);
                const now = new Date();
                if (dateFilter === 'month') return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
                if (dateFilter === 'year') return d.getFullYear() === now.getFullYear();
                if (dateFilter === 'custom' && start && end) return d >= new Date(start) && d <= new Date(end);
                return true;
            });

            const totalPayout = filtered.reduce((sum, p) => sum + p.amount, 0);

            useEffect(() => {
                if (!showChart || !chartRef.current) return;
                const ctx = chartRef.current.getContext('2d');
                if (chartInst.current) chartInst.current.destroy();

                const monthly = {};
                filtered.forEach(p => {
                    const m = new Date(p.completedAt).toLocaleDateString('it-IT', {year: 'numeric', month: 'short'});
                    monthly[m] = (monthly[m] || 0) + p.amount;
                });

                const labels = Object.keys(monthly);
                const data = labels.map(l => monthly[l]);

                chartInst.current = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels,
                        datasets: [{
                            label: 'Payout',
                            data,
                            backgroundColor: 'rgba(168, 85, 247, 0.5)',
                            borderColor: 'rgb(168, 85, 247)',
                            borderWidth: 1
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } }
                    }
                });

                return () => { if (chartInst.current) chartInst.current.destroy(); };
            }, [showChart, filtered]);

            return (
                <div className="space-y-6">
                    <h2 className="text-2xl font-bold text-white">Archivio</h2>

                    <div>
                        <div className="flex flex-col md:flex-row gap-3 mb-4">
                            <select value={dateFilter} onChange={e => setDateFilter(e.target.value)} className="glass-card text-white px-4 py-2 rounded-lg">
                                <option value="all">Tutti</option>
                                <option value="month">Questo mese</option>
                                <option value="year">Quest'anno</option>
                                <option value="custom">Personalizzato</option>
                            </select>

                            {dateFilter === 'custom' && (
                                <>
                                    <input type="date" value={start} onChange={e => setStart(e.target.value)} className="glass-card text-white px-4 py-2 rounded-lg" />
                                    <input type="date" value={end} onChange={e => setEnd(e.target.value)} className="glass-card text-white px-4 py-2 rounded-lg" />
                                </>
                            )}

                            <button onClick={() => setShowChart(!showChart)} className="glass-card px-4 py-2 rounded-lg text-white hover:bg-white/10">
                                {showChart ? '📊 Nascondi' : '📊 Grafico'}
                            </button>
                        </div>

                        <div className="glass-card rounded-xl p-6 mb-4">
                            <div className="text-gray-400 text-sm mb-2">Totale Payout</div>
                            <div className="text-white font-bold text-3xl">${totalPayout.toLocaleString()}</div>
                            <div className="text-gray-500 text-xs mt-1">{filtered.length} {filtered.length === 1 ? 'pagamento' : 'pagamenti'}</div>
                        </div>

                        {showChart && filtered.length > 0 && (
                            <div className="glass-card rounded-xl p-6 mb-4">
                                <div style={{height: '300px'}}>
                                    <canvas ref={chartRef}></canvas>
                                </div>
                            </div>
                        )}

                        <div className="space-y-3">
                            {filtered.map(p => (
                                <div key={p.id} className="glass-card rounded-xl p-4">
                                    <div className="flex justify-between items-start">
                                        <div>
                                            <div className="text-white font-bold">{p.clientName}</div>
                                            <div className="text-gray-400 text-sm">{p.accountNumber}</div>
                                            <div className="text-gray-500 text-xs mt-1">Pagato: {new Date(p.completedAt).toLocaleDateString('it-IT')}</div>
                                        </div>
                                        <div className="flex items-center gap-3">
                                            <div className="text-green-400 font-bold text-xl">${p.amount.toLocaleString()}</div>
                                            <button onClick={() => setActionModal({
                                                type: 'danger', title: 'Elimina Payout',
                                                message: `Eliminare il payout di $${p.amount.toLocaleString()} per ${p.clientName}?`,
                                                onConfirm: () => { onDelPayout(p.id); setActionModal(null); }
                                            })} className="text-gray-500 hover:text-red-400 text-lg px-1">🗑️</button>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>

                        {filtered.length === 0 && <div className="text-center py-10 text-gray-400">Nessun payout trovato</div>}
                    </div>

                    <div>
                        <h3 className="text-xl font-bold text-white mb-4">Conti Bruciati ({archived.length})</h3>
                        <div className="space-y-3">
                            {archived.map(a => (
                                <div key={a.id} className="glass-card rounded-xl p-4 border-red-500/30">
                                    <div className="flex justify-between items-start">
                                        <div>
                                            <div className="text-white font-bold">{a.clientName}</div>
                                            <div className="text-gray-400 text-sm">{a.accountNumber}</div>
                                            <div className="text-gray-500 text-xs mt-1">Archiviato: {new Date(a.archivedAt).toLocaleDateString('it-IT')}</div>
                                        </div>
                                        <div className="flex items-center gap-3">
                                            <span className="text-red-400 text-2xl">🔥</span>
                                            <button onClick={() => setActionModal({
                                                type: 'danger', title: 'Elimina Conto',
                                                message: `Eliminare definitivamente il conto di ${a.clientName}? I dati non saranno recuperabili.`,
                                                onConfirm: () => { onDelAcc(a.id); setActionModal(null); }
                                            })} className="text-gray-500 hover:text-red-400 text-lg px-1">🗑️</button>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                        {archived.length === 0 && <div className="text-center py-10 text-gray-400">Nessun conto archiviato</div>}
                    </div>

                    {actionModal && <ActionModal {...actionModal} onCancel={() => setActionModal(null)} />}
                </div>
            );
        }

                <div className="space-y-6">
                    <h2 className="text-2xl font-bold text-white">Configurazione</h2>

                    <div className="glass-card rounded-xl p-6">

                                    <label className="text-gray-500 text-xs">Rosso ≤</label>

                                </div>
                                <div>
                                    <label className="text-gray-500 text-xs">Blu ></label>
                                    <input type="number" value={settings.expiryThresholds.blue} onChange={e => onUpdSets({expiryThresholds: {...settings.expiryThresholds, blue: parseInt(e.target.value)}})} className="w-full glass-card text-white px-3 py-2 rounded-lg text-sm mt-1" />
                                </div>
                            </div>
                        </div>
                    </div>

                    <div>
                        <div className="flex justify-between items-center mb-4">

                        <div className="space-y-3">

                                            <input type="number" value={p.expiryDays || ''} onChange={e => onUpdProp(p.id, {expiryDays: e.target.value ? parseInt(e.target.value) : null})} className="w-full glass-card text-white px-3 py-2 rounded-lg" placeholder="Giorni scadenza (vuoto = no)" />
                                            <div className="flex gap-2">

                                                <button onClick={() => setEditing(null)} className="bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded-lg">Annulla</button>
                                            </div>
                                        </div>
                                    ) : (
                                        <>
                                            <div className="flex justify-between items-start mb-3">
                                                <div>
                                                    <div className="text-white font-bold text-lg">{p.name}</div>
                                                    <div className="text-gray-400 text-sm">Scadenza: {p.expiryDays ? `${p.expiryDays} giorni` : 'Nessuna'}</div>
                                                </div>
                                                <div className="flex gap-2">
                                                    <button onClick={() => setEditing(p.id)} className="text-orange-400 hover:text-orange-300 text-sm">✏️ Modifica</button>
                                                    <button onClick={() => onDelProp(p.id)} className="text-red-400 hover:text-red-300 text-sm">🗑️</button>
                                                </div>
                                            </div>

                                            <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
                                                {Object.entries(p.rules).map(([ph, r]) => (
                                                    <div key={ph} className="bg-white/5 p-3 rounded-lg">
                                                        <div className="text-white font-semibold text-sm mb-2 capitalize">
                                                            {ph.replace('fase', 'Fase ').replace('onephase', 'One Phase')}
                                                        </div>
                                                        <div className="text-xs text-gray-400 space-y-1">
                                                            {r.target && <div>Target: +{r.target}%</div>}
                                                            {r.maxLoss && <div>Max Loss: {r.maxLoss}%</div>}
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </>
                                    )}
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        function AddAccModal({props, onAdd, onClose}) {
            const [f, setF] = useState({accountNumber: '', clientName: '', propFirm: props[0]?.id || '', size: 100000, phase: 'Fase 1', strategy: 'Manuale', platform: 'MT5', currentBalance: 100000});

            return (
                <div className="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-50 p-4" onClick={onClose}>
                    <div className="glass-modal rounded-xl p-6 max-w-2xl w-full max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
                        <h2 className="text-2xl font-bold text-white mb-6">Nuovo Conto</h2>
                        
                        <form onSubmit={e => { e.preventDefault(); onAdd(f); }} className="space-y-4">
                            <div className="grid md:grid-cols-2 gap-4">
                                <div><label className="block text-gray-400 text-sm mb-2">Numero Conto</label><input type="text" value={f.accountNumber} onChange={e => setF({...f, accountNumber: e.target.value})} className="w-full glass-card text-white px-4 py-2 rounded-lg" required /></div>
                                <div><label className="block text-gray-400 text-sm mb-2">Cliente</label><input type="text" value={f.clientName} onChange={e => setF({...f, clientName: e.target.value})} className="w-full glass-card text-white px-4 py-2 rounded-lg" required /></div>
                                <div><label className="block text-gray-400 text-sm mb-2">Prop Firm</label><select value={f.propFirm} onChange={e => setF({...f, propFirm: e.target.value})} className="w-full glass-card text-white px-4 py-2 rounded-lg">{props.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}</select></div>
                                <div><label className="block text-gray-400 text-sm mb-2">Size</label><select value={f.size} onChange={e => { const s = parseInt(e.target.value); setF({...f, size: s, currentBalance: s}); }} className="w-full glass-card text-white px-4 py-2 rounded-lg"><option value={25000}>25k</option><option value={50000}>50k</option><option value={100000}>100k</option><option value={200000}>200k</option></select></div>
                                <div><label className="block text-gray-400 text-sm mb-2">Fase</label><select value={f.phase} onChange={e => setF({...f, phase: e.target.value})} className="w-full glass-card text-white px-4 py-2 rounded-lg"><option value="Fase 1">Fase 1</option><option value="Fase 2">Fase 2</option><option value="OnePhase">One Phase</option><option value="Funded">Funded</option></select></div>
                                <div><label className="block text-gray-400 text-sm mb-2">Strategia</label><select value={f.strategy} onChange={e => setF({...f, strategy: e.target.value})} className="w-full glass-card text-white px-4 py-2 rounded-lg"><option value="Manuale">Manuale</option><option value="Mate">Matematico</option></select></div>
                                <div><label className="block text-gray-400 text-sm mb-2">Platform</label><select value={f.platform} onChange={e => setF({...f, platform: e.target.value})} className="w-full glass-card text-white px-4 py-2 rounded-lg"><option value="MT4">MT4</option><option value="MT5">MT5</option><option value="cTrader">cTrader</option><option value="DxTrade">DxTrade</option></select></div>
                                <div><label className="block text-gray-400 text-sm mb-2">Balance</label><input type="number" value={f.currentBalance} onChange={e => setF({...f, currentBalance: parseFloat(e.target.value)})} className="w-full glass-card text-white px-4 py-2 rounded-lg" required /></div>
                            </div>

                            <div className="flex gap-3 pt-4">
                                <button type="button" onClick={onClose} className="flex-1 bg-gray-600 hover:bg-gray-700 text-white py-3 rounded-lg font-semibold">Annulla</button>
                                <button type="submit" className="flex-1 bg-orange-500 hover:bg-orange-400 text-white py-3 rounded-lg font-semibold">Aggiungi</button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        }

        function AddPropModal({onAdd, onClose}) {
            const [f, setF] = useState({name: '', expiryDays: '', hasPhase1: true, hasPhase2: true, isOnePhase: false, rules: {fase1: {target: 10, maxLoss: -10}, fase2: {target: 5, maxLoss: -10}, funded: {maxLoss: -10}}});

            const handleSubmit = e => {
                e.preventDefault();
                let rules = {};
                if (f.isOnePhase) {
                    rules.onephase = f.rules.fase1;
                    rules.funded = f.rules.funded;
                } else {
                    if (f.hasPhase1) rules.fase1 = f.rules.fase1;
                    if (f.hasPhase2) rules.fase2 = f.rules.fase2;
                    rules.funded = f.rules.funded;
                }
                onAdd({name: f.name, expiryDays: f.expiryDays ? parseInt(f.expiryDays) : null, rules});
            };

            return (
                <div className="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-50 p-4" onClick={onClose}>
                    <div className="glass-modal rounded-xl p-6 max-w-3xl w-full max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
                        <h2 className="text-2xl font-bold text-white mb-6">Nuova Prop Firm</h2>
                        
                        <form onSubmit={handleSubmit} className="space-y-6">
                            <div className="grid md:grid-cols-2 gap-4">
                                <div><label className="block text-gray-400 text-sm mb-2">Nome</label><input type="text" value={f.name} onChange={e => setF({...f, name: e.target.value})} className="w-full glass-card text-white px-4 py-2 rounded-lg" required /></div>
                                <div><label className="block text-gray-400 text-sm mb-2">Giorni Scadenza (vuoto = mai)</label><input type="number" value={f.expiryDays} onChange={e => setF({...f, expiryDays: e.target.value})} className="w-full glass-card text-white px-4 py-2 rounded-lg" placeholder="Es: 30" /></div>
                            </div>

                            <div><label className="flex items-center text-white"><input type="checkbox" checked={f.isOnePhase} onChange={e => setF({...f, isOnePhase: e.target.checked})} className="mr-2" />One Phase Challenge</label></div>

                            <div className="space-y-4">
                                <h3 className="text-white font-semibold">Regole Challenge</h3>

                                {!f.isOnePhase && (
                                    <>
                                        <div className="bg-white/5 p-4 rounded-lg">
                                            <div className="flex justify-between mb-3"><span className="text-white font-semibold">Fase 1</span><label className="flex items-center text-sm text-gray-400"><input type="checkbox" checked={f.hasPhase1} onChange={e => setF({...f, hasPhase1: e.target.checked})} className="mr-2" />Abilita</label></div>
                                            {f.hasPhase1 && <div className="grid grid-cols-2 gap-3"><div><label className="block text-gray-400 text-xs mb-1">Target %</label><input type="number" value={f.rules.fase1.target} onChange={e => setF({...f, rules: {...f.rules, fase1: {...f.rules.fase1, target: parseFloat(e.target.value)}}})} className="w-full glass-card text-white px-3 py-2 rounded text-sm" /></div><div><label className="block text-gray-400 text-xs mb-1">Max Loss %</label><input type="number" value={f.rules.fase1.maxLoss} onChange={e => setF({...f, rules: {...f.rules, fase1: {...f.rules.fase1, maxLoss: parseFloat(e.target.value)}}})} className="w-full glass-card text-white px-3 py-2 rounded text-sm" /></div></div>}
                                        </div>

                                        <div className="bg-white/5 p-4 rounded-lg">
                                            <div className="flex justify-between mb-3"><span className="text-white font-semibold">Fase 2</span><label className="flex items-center text-sm text-gray-400"><input type="checkbox" checked={f.hasPhase2} onChange={e => setF({...f, hasPhase2: e.target.checked})} className="mr-2" />Abilita</label></div>
                                            {f.hasPhase2 && <div className="grid grid-cols-2 gap-3"><div><label className="block text-gray-400 text-xs mb-1">Target %</label><input type="number" value={f.rules.fase2.target} onChange={e => setF({...f, rules: {...f.rules, fase2: {...f.rules.fase2, target: parseFloat(e.target.value)}}})} className="w-full glass-card text-white px-3 py-2 rounded text-sm" /></div><div><label className="block text-gray-400 text-xs mb-1">Max Loss %</label><input type="number" value={f.rules.fase2.maxLoss} onChange={e => setF({...f, rules: {...f.rules, fase2: {...f.rules.fase2, maxLoss: parseFloat(e.target.value)}}})} className="w-full glass-card text-white px-3 py-2 rounded text-sm" /></div></div>}
                                        </div>
                                    </>
                                )}

                                {f.isOnePhase && (
                                    <div className="bg-white/5 p-4 rounded-lg">
                                        <div className="text-white font-semibold mb-3">One Phase</div>
                                        <div className="grid grid-cols-2 gap-3"><div><label className="block text-gray-400 text-xs mb-1">Target %</label><input type="number" value={f.rules.fase1.target} onChange={e => setF({...f, rules: {...f.rules, fase1: {...f.rules.fase1, target: parseFloat(e.target.value)}}})} className="w-full glass-card text-white px-3 py-2 rounded text-sm" /></div><div><label className="block text-gray-400 text-xs mb-1">Max Loss %</label><input type="number" value={f.rules.fase1.maxLoss} onChange={e => setF({...f, rules: {...f.rules, fase1: {...f.rules.fase1, maxLoss: parseFloat(e.target.value)}}})} className="w-full glass-card text-white px-3 py-2 rounded text-sm" /></div></div>
                                    </div>
                                )}

                                <div className="bg-white/5 p-4 rounded-lg">
                                    <div className="text-white font-semibold mb-3">Funded</div>
                                    <div><label className="block text-gray-400 text-xs mb-1">Max Loss %</label><input type="number" value={f.rules.funded.maxLoss} onChange={e => setF({...f, rules: {...f.rules, funded: {maxLoss: parseFloat(e.target.value)}}})} className="w-full glass-card text-white px-3 py-2 rounded text-sm" /></div>
                                </div>
                            </div>

                            <div className="flex gap-3">
                                <button type="button" onClick={onClose} className="flex-1 bg-gray-600 hover:bg-gray-700 text-white py-3 rounded-lg font-semibold">Annulla</button>
                                <button type="submit" className="flex-1 bg-orange-500 hover:bg-orange-400 text-white py-3 rounded-lg font-semibold">Aggiungi</button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
